<!DOCTYPE html>
<html lang="{{ site.language | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <!-- Theme stylesheet (compiled from _sass/retr0-theme/main.scss) -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/retr0-theme.css">

  <!-- Favicons -->
  {% if site.favicon-32x32 %}<link rel="icon" type="image/png" sizes="32x32" href="{{ site.baseurl }}/assets/img/{{ site.favicon-32x32 }}">{% endif %}

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:type" content="website">
</head>
<body>

  {% include retr0-nav.html %}

  <main id="main-content">
    {{ content }}
  </main>

  {% include retr0-footer.html %}

  <script src="{{ site.baseurl }}/assets/js/retr0-theme.js"></script>
</body>
</html>
