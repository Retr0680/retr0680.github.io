---
layout: default
---

<div class="page-wrapper">
  <div class="page-container">

    <header class="page-header">
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.subheadline %}
      <p class="page-subtitle">{{ page.subheadline }}</p>
      {% endif %}
    </header>

    <div class="page-body">
      {{ content }}
    </div>

  </div>
</div>
